<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sugestão de Receitas</title>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #387d39;
            --background: #f1f6e9;
            --white: #ffffff;
            --text-dark: #1a461a;
            --text-muted: #677f64;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 375px;
            height: 812px;
            background: var(--background);
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .header { padding: 50px 20px 10px; text-align: center; background: white; }
        .header h1 { font-size: 20px; color: var(--text-dark); margin-bottom: 15px; }

        /* Campo de Busca */
        .search-area { padding: 15px 20px; background: white; border-bottom: 1px solid #eee; }
        .search-box {
            display: flex;
            background: #f3f4f6;
            border-radius: 12px;
            padding: 10px;
            align-items: center;
            border: 1px solid #ddd;
        }
        .search-box input {
            border: none; background: none; outline: none;
            flex: 1; padding: 5px 10px; font-size: 14px;
        }
        .btn-search {
            background: var(--primary); color: white; border: none;
            border-radius: 8px; padding: 8px 15px; cursor: pointer; font-weight: 600;
        }

        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 90px; }
        
        .suggestion-card {
            background: white; border-radius: 16px; overflow: hidden;
            margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: 0.3s; cursor: pointer;
        }
        .suggestion-card img { width: 100%; height: 140px; object-fit: cover; }
        .card-info { padding: 15px; }
        .card-info h3 { font-size: 16px; color: var(--text-dark); margin-bottom: 5px; }
        .card-info p { font-size: 12px; color: var(--text-muted); }

        /* Bottom Nav */
        .nav-bar {
            position: absolute; bottom: 0; width: 100%; height: 70px;
            background: white; display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid #eee; padding-bottom: 10px;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: #999; font-size: 10px; text-decoration: none;
        }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 22px; margin-bottom: 3px; }

        .loading { text-align: center; padding: 20px; display: none; }
        .spin { animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>🍳 Sugestões do Chef</h1>
    </div>

    <div class="search-area">
        <div class="search-box">
            <input type="text" id="input-ingrediente" placeholder="Quais itens para receita ?">
            <button class="btn-search" onclick="buscarSugestoes()">Buscar</button>
        </div>
    </div>

    <div class="content" id="lista-sugestoes">
        <div id="status-msg" style="text-align: center; color: var(--text-muted); margin-top: 50px;">
            <iconify-icon icon="lucide:chef-hat" style="font-size: 40px;"></iconify-icon>
            <p>Digite um ingrediente para<br>ver sugestões de receitas.</p>
        </div>
        </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item">
            <iconify-icon icon="lucide:home" class="nav-icon"></iconify-icon>
            <span>Início</span>
        </a>
        <a href="estoque.html" class="nav-item">
            <iconify-icon icon="lucide:package" class="nav-icon"></iconify-icon>
            <span>Estoque</span>
        </a>
        <a href="sugestReceita.html" class="nav-item active">
            <iconify-icon icon="lucide:chef-hat" class="nav-icon"></iconify-icon>
            <span>Receitas</span>
        </a>
        <a href="perfilT.html" class="nav-item">
            <iconify-icon icon="lucide:user" class="nav-icon"></iconify-icon>
            <span>Perfil</span>
        </a>
    </nav>
</div>

<script>
  async function buscarSugestoes() {
    const ingrediente = document.getElementById('input-ingrediente').value;
    const lista = document.getElementById('lista-sugestoes');
    const token = localStorage.getItem('token'); // Pega o token salvo no login

    if (!ingrediente) return alert("Digite um ingrediente!");
    if (!token) return alert("Sessão expirada. Faça login novamente.");

    lista.innerHTML = `<div class="loading" style="display:block; text-align:center;">
        <iconify-icon icon="lucide:loader-2" class="spin" style="font-size:30px; color:var(--primary)"></iconify-icon>
        <p>O Chef está pensando...</p>
    </div>`;

    try {
        const response = await fetch(`/api/sugestoes?ingrediente=${encodeURIComponent(ingrediente)}`, {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        });

        if (!response.ok) {
            const erroTxt = await response.text();
            console.error("Resposta do servidor:", erroTxt);
            throw new Error("Erro na rede");
        }

        const dados = await response.json();
        lista.innerHTML = ""; 

        if (dados.length === 0) {
            lista.innerHTML = "<p>Nenhuma sugestão encontrada.</p>";
            return;
        }

        dados.forEach(receita => {
            const card = document.createElement('div');
            card.className = 'suggestion-card';
            // Aqui usamos a função que já existe no seu projeto para gerar os detalhes
            card.onclick = () => alert("Receita selecionada: " + receita.nome); 
            
            card.innerHTML = `
                
                <div class="card-info">
                    <h3>${receita.nome}</h3>
                    <p>⏱️ ${receita.tempo} | 👨‍🍳 Sugestão IA</p>
                </div>
            `;
            lista.appendChild(card);
        });

    } catch (error) {
        console.error("Erro no Frontend:", error);
        lista.innerHTML = `<p style="color:red; text-align:center;">Erro ao buscar sugestões.<br><small>${error.message}</small></p>`;
    }
}
    // Permitir busca ao apertar Enter
    document.getElementById('input-ingrediente').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') buscarSugestoes();
    });
</script>

</body>
</html>

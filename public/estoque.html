<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Despensa - Estoque Pro</title>
    
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #387d39;
            --background: #f1f6e9;
            --card-bg: #ffffff;
            --text-main: #1a461a;
            --text-muted: #677f64;
            --status-warning: #fef9c3;
            --status-danger: #fee2e2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            display: flex;
            justify-content: center; 
            align-items: center;     
            min-height: 100vh;       
            margin: 0;
            background-color: #e5e7eb;
        }

        .app-container {
            width: 375px;
            height: 812px;
            background-color: var(--background);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border-radius: 30px;
        }

        .header { padding: 40px 20px 10px; display: flex; flex-direction: column; }
        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .header h1 { color: var(--text-main); font-size: 22px; display: flex; align-items: center; gap: 8px; }

        .btn-add-topo {
            background: var(--primary);
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
        }

        #area-acoes-massa { display: none; margin-top: 15px; animation: fadeIn 0.3s; }

        .inventory-container { flex: 1; overflow-y: auto; padding: 0 8px 100px; scrollbar-width: none; }
        .inventory-container::-webkit-scrollbar { display: none; }

        .stock-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; table-layout: fixed; }
        .col-check { width: 30px; }
        .col-nome { width: auto; }
        .col-qtd { width: 40px; }
        .col-val { width: 60px; }
        .col-actions { width: 110px; }

        .stock-table th { padding: 4px; font-size: 9px; color: var(--text-muted); text-transform: uppercase; text-align: center; }
        .stock-table th.col-nome { text-align: left; }

        .stock-item { background: white; transition: 0.2s; }
        .stock-item td { padding: 10px 2px; font-size: 12px; vertical-align: middle; text-align: center; }
        .stock-item td.col-nome { text-align: left; white-space: normal; word-break: break-word; line-height: 1.2; }
        .stock-item td:first-child { border-radius: 12px 0 0 12px; padding-left: 8px; }
        .stock-item td:last-child { border-radius: 0 12px 12px 0; padding-right: 5px; }

        .stock-item.expired { background-color: var(--status-danger) !important; color: #991b1b; }
        .stock-item.warning { background-color: var(--status-warning) !important; color: #854d0e; }

        .qty-badge { background: #eee; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 11px; }

        .actions { display: flex; gap: 4px; justify-content: center; }
        .btn-action { border: none; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; height: 26px; }
        .btn-recipe { background: #4f46e5; padding: 0 5px; font-size: 9px; font-weight: bold; text-transform: uppercase; min-width: 50px; }
        .btn-edit { background: #16a34a; width: 26px; }
        .btn-delete { background: #dc2626; width: 26px; }

        /* Modais */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-box { background: white; padding: 25px; border-radius: 25px; width: 100%; max-width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        .modal-title { font-size: 18px; font-weight: 700; color: var(--text-main); margin-bottom: 20px; text-align: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        /* Estilo dos campos dentro do Modal de Edição */
        .modal-field { margin-bottom: 15px; }
        .modal-field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; }
        .modal-input { width: 100%; height: 45px; border: 1px solid #dfe6dc; border-radius: 10px; padding: 0 12px; font-size: 14px; outline: none; }
        .modal-input:focus { border: 2px solid var(--primary); }

        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-modal { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-modal-save { background: var(--primary); color: white; }
        .btn-modal-cancel { background: #eee; color: #666; }

        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 70px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #999; font-size: 10px; text-decoration: none; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="header-top">
            <h1>📦 Meu Estoque</h1>
            <button class="btn-add-topo" onclick="window.location.href='index.html'">
                <iconify-icon icon="lucide:plus"></iconify-icon>
            </button>
        </div>
        
        <div id="area-acoes-massa">
            <button onclick="gerarReceitaMultipla()" class="btn-action btn-recipe" style="width: 100%; height: 35px;">
                ✨ Gerar Receita com Selecionados
            </button>
        </div>
    </div>

    <div class="inventory-container">
        <table class="stock-table">
            <thead>
                <tr>
                    <th class="col-check"></th>
                    <th class="col-nome">Produto</th>
                    <th class="col-qtd">QTD</th>
                    <th class="col-val">Validade</th>
                    <th class="col-actions">Ações</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela"></tbody>
        </table>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item">
            <iconify-icon icon="lucide:home"></iconify-icon>
            <span>Início</span>
        </a>
        <div class="nav-item active">
            <iconify-icon icon="lucide:package"></iconify-icon>
            <span>Estoque</span>
        </div>
        <div class="nav-item">
            <iconify-icon icon="lucide:chef-hat"></iconify-icon>
            <span>Receitas</span>
        </div>
        <div class="nav-item">
            <iconify-icon icon="lucide:user"></iconify-icon>
            <span>Perfil</span>
        </div>
    </nav>
</div>

<div id="modal-receita" class="modal-overlay">
    <div class="modal-box">
        <div id="conteudo-receita"></div>
        <button onclick="fecharModal('modal-receita')" class="btn-modal btn-modal-cancel" style="width:100%; margin-top:15px; background: #dc2626; color: white;">Fechar</button>
    </div>
</div>

<div id="modal-edicao" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-title">Editar Produto</div>
        
        <div class="modal-field">
            <label>Produto</label>
            <input type="text" id="edit-nome" class="modal-input" disabled style="background: #f9f9f9; color: #888;">
        </div>

        <div class="modal-field">
            <label>Quantidade</label>
            <input type="number" id="edit-qtd" class="modal-input" min="1">
        </div>

        <div class="modal-field">
            <label>Data de Validade</label>
            <input type="date" id="edit-val" class="modal-input">
        </div>

        <div class="modal-buttons">
            <button onclick="fecharModal('modal-edicao')" class="btn-modal btn-modal-cancel">Cancelar</button>
            <button id="btn-confirmar-edicao" class="btn-modal btn-modal-save">Salvar</button>
        </div>
    </div>
</div>

<script>
    let itemSendoEditadoId = null;

    function getAuthHeaders() {
        const token = localStorage.getItem('token');
        return {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
        };
    }

    async function carregarEstoque() {
        try {
            const response = await fetch('/api/estoque', { headers: getAuthHeaders() });
            if (!response.ok) { window.location.href = 'login.html'; return; }

            const estoque = await response.json();
            const corpo = document.getElementById('corpo-tabela');
            corpo.innerHTML = '';
            const hoje = new Date();
            hoje.setHours(0, 0, 0, 0);

            estoque.forEach(prod => {
                let classeAlerta = "";
                let statusTexto = "";

                if (prod.validade) {
                    const [ano, mes, dia] = prod.validade.split('-');
                    const dataVal = new Date(ano, mes - 1, dia);
                    const diffDias = Math.ceil((dataVal - hoje) / (1000 * 3600 * 24));

                    if (diffDias < 0) { classeAlerta = "expired"; statusTexto = "Venc."; }
                    else if (diffDias <= 7) { classeAlerta = "warning"; statusTexto = `${diffDias}d`; }
                    else { statusTexto = `${diffDias}d`; }
                }

                const tr = document.createElement('tr');
                tr.className = `stock-item ${classeAlerta}`;
                tr.innerHTML = `
                    <td class="col-check"><input type="checkbox" onchange="atualizarBotaoMassa()"></td>
                    <td class="col-nome"><b>${prod.nome}</b></td>
                    <td class="col-qtd"><span class="qty-badge">${prod.quantidade}</span></td>
                    <td class="col-val" style="font-size: 10px; line-height: 1.1;">
                        ${prod.validade ? prod.validade.split('-').reverse().slice(0,2).join('/') : '--'}<br>
                        <small style="opacity: 0.8">${statusTexto}</small>
                    </td>
                    <td class="col-actions">
                        <div class="actions">
                            <button class="btn-action btn-recipe" onclick="gerarReceita('${prod.nome}')">Receita</button>
                            <button class="btn-action btn-edit" onclick="abrirEdicao(${prod.id}, '${prod.nome.replace(/'/g, "\\'")}', ${prod.quantidade}, '${prod.validade}')">
                                <iconify-icon icon="lucide:pencil"></iconify-icon>
                            </button>
                            <button class="btn-action btn-delete" onclick="deletarItem(${prod.id})">
                                <iconify-icon icon="lucide:trash-2"></iconify-icon>
                            </button>
                        </div>
                    </td>
                `;
                corpo.appendChild(tr);
            });
        } catch (error) { console.error("Erro:", error); }
    }

    // FUNÇÃO PARA ABRIR O NOVO MODAL DE EDIÇÃO
    function abrirEdicao(id, nome, qtd, validade) {
        itemSendoEditadoId = id;
        document.getElementById('edit-nome').value = nome;
        document.getElementById('edit-qtd').value = qtd;
        document.getElementById('edit-val').value = validade || '';
        
        document.getElementById('modal-edicao').style.display = 'flex';

        // Configura o botão de salvar para este item específico
        document.getElementById('btn-confirmar-edicao').onclick = salvarEdicao;
    }

    async function salvarEdicao() {
        const novaQtd = document.getElementById('edit-qtd').value;
        const novaVal = document.getElementById('edit-val').value;

        if (!novaQtd || novaQtd < 1) { alert("Informe uma quantidade válida."); return; }

        try {
            const response = await fetch(`/api/estoque/${itemSendoEditadoId}`, {
                method: 'PUT',
                headers: getAuthHeaders(),
                body: JSON.stringify({ 
                    quantidade: parseInt(novaQtd), 
                    validade: novaVal 
                })
            });

            if (response.ok) {
                fecharModal('modal-edicao');
                carregarEstoque();
            } else {
                alert("Erro ao atualizar produto.");
            }
        } catch (err) {
            console.error("Erro na edição:", err);
        }
    }

    function fecharModal(id) { document.getElementById(id).style.display = 'none'; }

    // Manter as outras funções (deletar, receita, etc.)
    async function deletarItem(id) {
        if (!confirm("Excluir item?")) return;
        await fetch(`/api/estoque/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
        carregarEstoque();
    }

    function atualizarBotaoMassa() {
        const selecionados = document.querySelectorAll('#corpo-tabela input[type="checkbox"]:checked');
        document.getElementById('area-acoes-massa').style.display = selecionados.length >= 2 ? 'block' : 'none';
    }

    async function gerarReceita(nome) {
        const modal = document.getElementById('modal-receita');
        const conteudo = document.getElementById('conteudo-receita');
        modal.style.display = 'flex';
        conteudo.innerHTML = `<div style="text-align:center; padding:20px;"><iconify-icon icon="lucide:loader-2" style="animation:spin 1s linear infinite; font-size:30px; color:var(--primary);"></iconify-icon><br><br>Chef IA criando receita para: ${nome}...</div>`;
        try {
            const response = await fetch(`/receita/${encodeURIComponent(nome)}`, { headers: getAuthHeaders() });
            const receita = await response.json();
            let html = `<h3 style="color:#4f46e5; border-bottom:1px solid #eee; padding-bottom:8px;">🍽️ ${receita.nome}</h3>`;
            html += `<h4 style="margin-top:15px; font-size:14px;">🛒 Ingredientes:</h4><ul style="font-size:12px; margin-left:15px; color:#444;">` + receita.ingredientes.map(i => `<li>${i}</li>`).join('') + `</ul>`;
            html += `<h4 style="margin-top:15px; font-size:14px;">👨‍🍳 Preparo:</h4><ol style="font-size:12px; margin-left:15px; color:#444;">` + receita.preparo.map(p => `<li style="margin-bottom:5px;">${p}</li>`).join('') + `</ol>`;
            conteudo.innerHTML = html;
        } catch (e) { conteudo.innerHTML = "Erro na conexão com a IA."; }
    }

    window.onload = carregarEstoque;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minha Despensa - Home</title>
    
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #387d39;
            --background: #f1f6e9;
            --card-bg: #ffffff;
            --text-main: #1a461a;
            --text-muted: #677f64;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            display: flex;
            justify-content: center; 
            align-items: center;     
            height: 100vh;
            width: 100vw;
            margin: 0;
            background-color: #e5e7eb;
            overflow: hidden;
            padding: 20px; /* Espaço para ver o "celular" */
        }

        .app-container {
            width: 100%;
            max-width: 375px;
            height: 100%;
            max-height: 812px;
            background-color: var(--background);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border-radius: 30px; /* Bordas arredondadas estilo app */
            overflow: hidden;
        }

        .header { 
            padding: 50px 20px 30px; 
            text-align: center; 
        }
        .header h1 { 
            color: var(--text-main); 
            font-size: 24px; 
            font-weight: 700;
        }

        .content {
            flex: 1;
            padding: 0 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Campo de Scanner Minimalista */
        .scanner-input-wrapper {
            margin-bottom: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 20px;
            font-size: 16px;
            text-align: center;
            border: 2px dashed var(--primary); /* Borda de scanner */
            border-radius: 15px;
            background: white;
            outline: none;
            color: var(--text-main);
            transition: 0.3s;
        }

        input[type="text"]:focus {
            background: #fff;
            box-shadow: 0 0 15px rgba(56, 125, 57, 0.1);
            border-style: solid; /* Muda para linha contínua ao focar */
        }

        /* Botões */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: 0.3s;
            border: none;
        }

        .btn-scan { 
            background: var(--primary); 
            color: white; 
            box-shadow: 0 4px 12px rgba(56, 125, 57, 0.2);
        }

        .btn-stock { 
            background: white; 
            color: var(--text-main); 
            border: 1px solid #ddd; 
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            font-size: 11px;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #ddd; }
        .divider:not(:empty)::before { margin-right: 1.5em; }
        .divider:not(:empty)::after { margin-left: 1.5em; }

        /* Barra de Navegação Inferior */
        .nav-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 75px;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #eee;
            padding-bottom: 10px;
        }

        .nav-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: #bbb; 
            font-size: 10px; 
            text-decoration: none; 
            transition: 0.3s;
        }

        .nav-item.active { color: var(--primary); }
        .nav-item iconify-icon { font-size: 24px; margin-bottom: 4px; }

    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Minha Despensa</h1>
    </div>

    <div class="content">
        <div class="scanner-input-wrapper">
            <input type="text" id="input-leitor" placeholder="Aguardando Leitor..." autofocus>
        </div>

        <div class="divider">ou</div>

        <a href="scanner.html" class="btn btn-scan">
            <iconify-icon icon="lucide:camera" style="font-size: 20px;"></iconify-icon>
            Escanear com a Câmera
        </a>

        <a href="estoque.html" class="btn btn-stock">
            <iconify-icon icon="lucide:package" style="font-size: 20px;"></iconify-icon>
            Ver Meu Estoque
        </a>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active">
            <iconify-icon icon="lucide:home"></iconify-icon>
            <span>Início</span>
        </div>
        <a href="estoque.html" class="nav-item">
            <iconify-icon icon="lucide:package"></iconify-icon>
            <span>Estoque</span>
        </a>
        <a href="sugestReceitaT.html" class="nav-item">
            <iconify-icon icon="lucide:chef-hat"></iconify-icon>
            <span>Receitas</span>
        </a>
        <a href="perfilT.html" class="nav-item">
            <iconify-icon icon="lucide:user"></iconify-icon>
            <span>Perfil</span>
        </a>
    </nav>
</div>

<script>
    const inputLeitor = document.getElementById('input-leitor');

    // Escuta o Enter do leitor físico
    inputLeitor.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            const codigoLido = inputLeitor.value.replace(/\D/g, "");
            if (codigoLido) {
                window.location.href = `cadastro.html?codigo=${encodeURIComponent(codigoLido)}`;
            }
        }
    });

    // Mantém foco automático
    document.addEventListener('click', (e) => {
        if(e.target.tagName !== 'A' && e.target.tagName !== 'BUTTON' && !e.target.closest('a')) {
            inputLeitor.focus();
        }
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Despensa Inteligente</title>
    
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #387d39;
            --background: #f1f6e9;
            --text-main: #1a461a;
            --text-muted: #677f64;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e5e7eb;
        }

        .app-container {
            width: 375px;
            height: 812px;
            background: linear-gradient(to bottom right, #f5f9ed, #e3efd7);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border-radius: 30px;
            overflow: hidden;
            padding: 40px 24px;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            padding-top: 10px;
        }

        .back-btn {
            background: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .content { text-align: center; }

        h2 { color: var(--text-main); font-size: 26px; font-weight: 700; margin-bottom: 10px; }
        
        .description {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .field-label {
            display: block;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            margin-left: 4px;
        }

        .input-box {
            background: white;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border: 1px solid #dfe6dc;
            margin-bottom: 16px;
            transition: 0.3s;
        }

        .input-box:focus-within { border-color: var(--primary); }

        .input-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            color: var(--text-main);
            background: transparent;
        }

        .resend-link {
            display: block;
            text-align: right;
            margin-top: -8px;
            margin-bottom: 16px;
            font-size: 12px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .resend-link:hover { text-decoration: underline; }

        .btn {
            width: 100%;
            height: 54px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn-cancelar {
            background: transparent;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 10px;
        }

        #msg-status {
            margin: 15px 0;
            font-size: 13px;
            font-weight: 500;
            min-height: 20px;
        }

        .eye-icon { cursor: pointer; color: var(--text-muted); font-size: 20px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='login.html'">
                <iconify-icon icon="lucide:arrow-left"></iconify-icon>
            </button>
        </div>

        <div class="content">
            <h2>🔄 Nova Senha</h2>
            <p class="description">
                Insira o código enviado para o seu e-mail e escolha uma nova senha segura.
            </p>

            <div id="msg-status"></div>

            <label class="field-label">E-mail</label>
            <div class="input-box">
                <input type="email" id="email" placeholder="seu@email.com">
            </div>

            <label class="field-label">Código de Recuperação</label>
            <div class="input-box">
                <input type="text" id="token" placeholder="Ex: a1b2c3d4">
            </div>

            <label class="field-label">Nova Senha</label>
            <div class="input-box">
                <input type="password" id="novaSenha" placeholder="Mínimo 6 caracteres">
                <iconify-icon id="toggleSenha" class="eye-icon" icon="lucide:eye"></iconify-icon>
            </div>

            <a href="esqueci-senha.html" class="resend-link">Não recebeu o código? Enviar outro</a>

            <button class="btn" id="btnSalvar" onclick="salvarNovaSenha()">Atualizar Senha</button>
            <button class="btn btn-cancelar" onclick="window.location.href='login.html'">Cancelar</button>
        </div>
    </div>

    <script>
        async function salvarNovaSenha() {
            const email = document.getElementById('email').value;
            const token = document.getElementById('token').value;
            const novaSenha = document.getElementById('novaSenha').value;
            const msgStatus = document.getElementById('msg-status');
            const btn = document.getElementById('btnSalvar');

            if (!email || !token || !novaSenha) {
                msgStatus.innerText = "⚠️ Preencha todos os campos!";
                msgStatus.style.color = "#d97706";
                return;
            }

            msgStatus.innerText = "Processando... ⏳";
            msgStatus.style.color = "var(--primary)";
            btn.disabled = true;

            try {
                const response = await fetch('/api/auth/redefinir-senha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, token, novaSenha })
                });

                const data = await response.json();

                if (response.ok) {
                    msgStatus.style.color = "green";
                    msgStatus.innerText = "✅ Senha alterada com sucesso!";
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2500);
                } else {
                    msgStatus.style.color = "red";
                    msgStatus.innerText = "❌ " + (data.erro || "Erro ao redefinir.");
                    btn.disabled = false;
                }
            } catch (error) {
                msgStatus.style.color = "red";
                msgStatus.innerText = "❌ Erro de conexão com o servidor.";
                btn.disabled = false;
            }
        }

        const olho = document.getElementById("toggleSenha");
        const campoSenha = document.getElementById("novaSenha");

        olho.addEventListener("click", function(){
            if(campoSenha.type === "password"){
                campoSenha.type = "text";
                olho.setAttribute("icon", "lucide:eye-off");
            } else {
                campoSenha.type = "password";
                olho.setAttribute("icon", "lucide:eye");
            }
        });
    </script>
</body>
</html>

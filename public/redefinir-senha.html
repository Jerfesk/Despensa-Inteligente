<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Redefinir Senha - Despensa Inteligente</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f8f9fa; }
        .form-card { border: 1px solid #ccc; padding: 30px; border-radius: 10px; width: 350px; background: white; box-shadow: 2px 2px 10px #ccc; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; color: #555; }
        input { width: 100%; margin-top: 5px; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        .msg-status { margin-top: 15px; font-size: 14px; text-align: center; min-height: 20px; }
        .btn-voltar { background-color: #6c757d; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>🔄 Nova Senha</h2>
        <p style="text-align: center; font-size: 14px; color: #666;">Insira o código enviado para o seu e-mail e escolha uma nova senha.</p>

        <label>E-mail:</label>
        <input type="email" id="email" placeholder="seu@email.com">

        <label>Código de Recuperação:</label>
        <input type="text" id="token" placeholder="Ex: a1b2c3d4">

        <label>Nova Senha:</label>
        <input type="password" id="novaSenha" placeholder="Digite sua nova senha">

        <div id="msg-status" class="msg-status"></div>

        <button onclick="salvarNovaSenha()">Atualizar Senha</button>
        <button class="btn-voltar" onclick="window.location.href='login.html'">Cancelar</button>
    </div>

    <script>
        async function salvarNovaSenha() {
            const email = document.getElementById('email').value;
            const token = document.getElementById('token').value;
            const novaSenha = document.getElementById('novaSenha').value;
            const msgStatus = document.getElementById('msg-status');

            if (!email || !token || !novaSenha) {
                msgStatus.innerText = "⚠️ Preencha todos os campos!";
                msgStatus.style.color = "orange";
                return;
            }

            msgStatus.innerText = "Processando... ⏳";
            msgStatus.style.color = "#007bff";

            try {
                const response = await fetch('/api/auth/redefinir-senha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, token, novaSenha })
                });

                const data = await response.json();

                if (response.ok) {
                    msgStatus.style.color = "green";
                    msgStatus.innerText = "✅ Senha alterada com sucesso!";
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2500);
                } else {
                    msgStatus.style.color = "red";
                    msgStatus.innerText = "❌ " + (data.erro || "Erro ao redefinir.");
                }
            } catch (error) {
                console.error("Erro:", error);
                msgStatus.style.color = "red";
                msgStatus.innerText = "❌ Erro de conexão com o servidor.";
            }
        }
    </script>
</body>
</html>

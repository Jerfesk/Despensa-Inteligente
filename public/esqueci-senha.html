<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Despensa Inteligente</title>
    
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #387d39;
            --background: #f1f6e9;
            --text-main: #1a461a;
            --text-muted: #677f64;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e5e7eb;
        }

        .app-container {
            width: 375px;
            height: 812px;
            background: linear-gradient(to bottom right, #f5f9ed, #e3efd7);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border-radius: 30px;
            overflow: hidden;
            padding: 40px 24px;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 40px;
            padding-top: 20px;
        }

        .back-btn {
            background: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-decoration: none;
            font-size: 20px;
        }

        .content { text-align: center; margin-top: 20px; }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: var(--primary);
            font-size: 40px;
        }

        h3 { color: var(--text-main); font-size: 24px; font-weight: 700; margin-bottom: 12px; }
        
        .description {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .input-box {
            background: white;
            height: 54px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border: 1px solid #dfe6dc;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .input-box:focus-within { border-color: var(--primary); }

        .input-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            color: var(--text-main);
        }

        .btn {
            width: 100%;
            height: 54px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }

        #msg {
            margin-top: 20px;
            font-size: 13px;
            font-weight: 500;
            min-height: 18px;
        }

        .footer-link {
            margin-top: auto;
            text-align: center;
            padding-bottom: 20px;
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <a href="login.html" class="back-btn">
                <iconify-icon icon="lucide:arrow-left"></iconify-icon>
            </a>
        </div>

        <div class="content">
            <div class="icon-circle">
                <iconify-icon icon="lucide:key-round"></iconify-icon>
            </div>
            
            <h3>Recuperar Senha</h3>
            <p class="description">
                Não se preocupe! Digite seu e-mail abaixo para receber as instruções de recuperação.
            </p>

            <div class="input-box">
                <iconify-icon icon="lucide:mail" style="margin-right: 12px; color: var(--text-muted);"></iconify-icon>
                <input type="email" id="email-recupera" placeholder="seu@email.com">
            </div>

            <button class="btn" id="btnEnviar" onclick="enviarEmail()">Enviar Código</button>
            
            <p id="msg"></p>
        </div>

        <div class="footer-link">
            <a href="login.html">Lembrei minha senha! <b>Entrar</b></a>
        </div>
    </div>

    <script>
        async function enviarEmail() {
            const email = document.getElementById('email-recupera').value;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('btnEnviar');

            if (!email) {
                msg.style.color = "red";
                msg.innerText = "Por favor, digite seu e-mail.";
                return;
            }

            msg.style.color = "var(--text-main)";
            msg.innerText = "Enviando... ⏳";
            btn.disabled = true;

            try {
                const response = await fetch('/api/auth/esqueci-senha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();
                
                if (response.ok && data.sucesso) {
                    msg.style.color = "green";
                    msg.innerText = "E-mail enviado! Verifique sua caixa de entrada.";
                    setTimeout(() => { 
                        window.location.href = 'redefinir-senha.html'; 
                    }, 3000);
                } else {
                    msg.style.color = "red";
                    msg.innerText = data.erro || "E-mail não encontrado.";
                    btn.disabled = false;
                }
            } catch (error) {
                msg.style.color = "red";
                msg.innerText = "Erro de conexão com o servidor.";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Despensa Inteligente</title>

  <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #f1f6e9;
      display: flex;
      justify-content: center;
      align-items: center;
      /* Mudamos para min-height para evitar quebras em telas pequenas */
      min-height: 100vh; 
      padding: 20px; /* Margem de segurança para não encostar nas bordas do navegador */
    }

    .container {
      /* Em vez de largura fixa, usamos largura máxima */
      width: 100%;
      max-width: 375px; 
      
      /* Removida a altura fixa de 812px que causava o problema do zoom */
      background: linear-gradient(to bottom right, #f5f9ed, #e3efd7);
      padding: 40px 24px;
      position: relative;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1); /* Adicionei uma sombra para destacar no PC */
    }

    .logo {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    h1 {
      text-align: center;
      color: #1A461A;
      font-size: 32px;
      margin-top: 10px;
      line-height: 38px;
    }

    /* O restante dos estilos permanece igual, mas ajuste os margins se achar necessário */
    .subtitle {
      text-align: center;
      margin-top: 20px;
      color: #1A461A;
      font-size: 15px;
      font-weight: 500;
    }

    .inputs {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-box {
      background: white;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border: 1px solid #ddd;
    }

    .input-box input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 16px;
    }

    .btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 14px;
      background: #387D39;
      color: white;
      font-size: 16px;
      font-weight: bold;
      margin-top: 25px;
      cursor: pointer;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 25px 0;
      color: #7B9676;
      font-size: 13px;
    }

    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #cdd8c3;
    }

    .divider span { margin: 0 12px; }

    .social {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 10px;
    }

    .social button {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: white;
      cursor: pointer;
    }
</style>

    

</head>

<body>

  <div class="container">

    <div class="logo">

      <svg width="100" height="100" viewBox="0 0 100 100">

        <path
          d="M48 85C48 85 15 65 5 30C-5 0 20 0 35 5C55 10 58 30 48 85Z"
          fill="#75B632">
        </path>

        <path
          d="M52 85C52 85 85 65 95 30C105 0 80 0 65 5C45 10 42 30 52 85Z"
          fill="#3A7E27">
        </path>

      </svg>

    </div>

    <h1>
      Despensa <br>
      Inteligente
    </h1>

    <p class="subtitle">
      Sua despensa inteligente,<br>
      seu planeta agradece.
    </p>

    <div class="inputs">

      <!-- EMAIL -->

      <div class="input-box">

        <iconify-icon
          class="left-icon"
          icon="lucide:mail">
        </iconify-icon>

        <input
          type="email"
          id="email"
          placeholder="Digite seu e-mail"
        >

      </div>

      <!-- SENHA -->

      <div class="input-box">

        <iconify-icon
          class="left-icon"
          icon="lucide:lock">
        </iconify-icon>

        <input
          type="password"
          id="senha"
          placeholder="Digite sua senha"
        >

        <iconify-icon
          id="toggleSenha"
          class="eye-icon"
          icon="lucide:eye">
        </iconify-icon>

      </div>

    </div>

    <div class="forgot">
      <a href="#">
        Esqueci minha senha
      </a>
    </div>

    <button class="btn" id="btnEntrar">
      Entrar
    </button>

    <div class="divider">
      <span>ou continue com</span>
    </div>

    <div class="social">

      <button>

        <iconify-icon
          class="google"
          icon="logos:google-icon">
        </iconify-icon>

      </button>

      <button>

        <iconify-icon
          class="apple"
          icon="mdi:apple">
        </iconify-icon>

      </button>

      <button>

        <iconify-icon
          class="mail"
          icon="lucide:mail">
        </iconify-icon>

      </button>

    </div>

  </div>

  <script>

    // BOTÃO ENTRAR

    const botao = document.getElementById("btnEntrar");

    botao.addEventListener("click", function(){

      const email = document.getElementById("email").value;

      const senha = document.getElementById("senha").value;

      if(email === "" || senha === ""){

        alert("Preencha todos os campos!");

        return;

      }

      alert(
        "Login realizado com sucesso!\n\n" +
        "Email: " + email +
        "\nSenha: " + senha
      );

    });


    // MOSTRAR E ESCONDER SENHA

    const olho = document.getElementById("toggleSenha");

    const campoSenha = document.getElementById("senha");

    olho.addEventListener("click", function(){

      if(campoSenha.type === "password"){

        campoSenha.type = "text";

        olho.setAttribute("icon", "lucide:eye-off");

      }else{

        campoSenha.type = "password";

        olho.setAttribute("icon", "lucide:eye");

      }

    });

  </script>

</body>
</html>

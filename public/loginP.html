<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Despensa Inteligente</title>

  <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#f1f6e9;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      width:375px;
      min-height:812px;
      background:linear-gradient(to bottom right,#f5f9ed,#e3efd7);
      padding:40px 24px;
      overflow:hidden;
      position:relative;
      border-radius:20px;
    }

    .logo{
      display:flex;
      justify-content:center;
      margin-top:40px;
    }

    h1{
      text-align:center;
      color:#1A461A;
      font-size:32px;
      margin-top:10px;
      line-height:38px;
    }

    .subtitle{
      text-align:center;
      margin-top:20px;
      color:#1A461A;
      font-size:15px;
      font-weight:500;
    }

    .inputs{
      margin-top:40px;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .input-box{
      background:white;
      height:52px;
      border-radius:14px;
      display:flex;
      align-items:center;
      padding:0 16px;
      border:1px solid #ddd;
      box-shadow:0 2px 8px rgba(0,0,0,0.05);
    }

    .input-box iconify-icon{
      font-size:20px;
      color:#677F64;
    }

    .input-box .left-icon{
      margin-right:10px;
    }

    .input-box .eye-icon{
      cursor:pointer;
    }

    .input-box input{
      flex:1;
      border:none;
      outline:none;
      background:transparent;
      font-size:16px;
      color:#1A461A;
    }

    .forgot{
      text-align:center;
      margin-top:20px;
    }

    .forgot a{
      text-decoration:none;
      color:#1A461A;
      font-weight:bold;
      font-size:14px;
    }

    .btn{
      width:100%;
      height:52px;
      border:none;
      border-radius:14px;
      background:#387D39;
      color:white;
      font-size:16px;
      font-weight:bold;
      margin-top:25px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#2e6a2f;
    }

    .divider{
      display:flex;
      align-items:center;
      margin:30px 0;
      color:#7B9676;
      font-size:13px;
    }

    .divider::before,
    .divider::after{
      content:"";
      flex:1;
      height:1px;
      background:#cdd8c3;
    }

    .divider span{
      margin:0 12px;
    }

    .social{
      display:flex;
      justify-content:center;
      gap:16px;
    }

    .social button{
      width:56px;
      height:56px;
      border-radius:50%;
      border:none;
      background:white;
      cursor:pointer;
      box-shadow:0 2px 8px rgba(0,0,0,0.05);
    }

    .social iconify-icon{
      font-size:26px;
    }

    .google{
      color:#DB4437;
    }

    .apple{
      color:black;
    }

    .mail{
      color:#1A461A;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="logo">

      <svg width="100" height="100" viewBox="0 0 100 100">

        <path
          d="M48 85C48 85 15 65 5 30C-5 0 20 0 35 5C55 10 58 30 48 85Z"
          fill="#75B632">
        </path>

        <path
          d="M52 85C52 85 85 65 95 30C105 0 80 0 65 5C45 10 42 30 52 85Z"
          fill="#3A7E27">
        </path>

      </svg>

    </div>

    <h1>
      Despensa <br>
      Inteligente
    </h1>

    <p class="subtitle">
      Sua despensa inteligente,<br>
      seu planeta agradece.
    </p>

    <div class="inputs">

      <!-- EMAIL -->

      <div class="input-box">

        <iconify-icon
          class="left-icon"
          icon="lucide:mail">
        </iconify-icon>

        <input
          type="email"
          id="email"
          placeholder="Digite seu e-mail"
        >

      </div>

      <!-- SENHA -->

      <div class="input-box">

        <iconify-icon
          class="left-icon"
          icon="lucide:lock">
        </iconify-icon>

        <input
          type="password"
          id="senha"
          placeholder="Digite sua senha"
        >

        <iconify-icon
          id="toggleSenha"
          class="eye-icon"
          icon="lucide:eye">
        </iconify-icon>

      </div>

    </div>

    <div class="forgot">
      <a href="#">
        Esqueci minha senha
      </a>
    </div>

    <button class="btn" id="btnEntrar">
      Entrar
    </button>

    <div class="divider">
      <span>ou continue com</span>
    </div>

    <div class="social">

      <button>

        <iconify-icon
          class="google"
          icon="logos:google-icon">
        </iconify-icon>

      </button>

      <button>

        <iconify-icon
          class="apple"
          icon="mdi:apple">
        </iconify-icon>

      </button>

      <button>

        <iconify-icon
          class="mail"
          icon="lucide:mail">
        </iconify-icon>

      </button>

    </div>

  </div>

  <script>

    // BOTÃO ENTRAR

    const botao = document.getElementById("btnEntrar");

    botao.addEventListener("click", function(){

      const email = document.getElementById("email").value;

      const senha = document.getElementById("senha").value;

      if(email === "" || senha === ""){

        alert("Preencha todos os campos!");

        return;

      }

      alert(
        "Login realizado com sucesso!\n\n" +
        "Email: " + email +
        "\nSenha: " + senha
      );

    });


    // MOSTRAR E ESCONDER SENHA

    const olho = document.getElementById("toggleSenha");

    const campoSenha = document.getElementById("senha");

    olho.addEventListener("click", function(){

      if(campoSenha.type === "password"){

        campoSenha.type = "text";

        olho.setAttribute("icon", "lucide:eye-off");

      }else{

        campoSenha.type = "password";

        olho.setAttribute("icon", "lucide:eye");

      }

    });

  </script>

</body>
</html>

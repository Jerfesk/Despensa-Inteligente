<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adicionar Produto</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />

  <style>
    :root {
      --primary: #387d39;
      --background: #f1f6e9;
      --card-bg: #ffffff;
      --text-main: #1a461a;
      --text-muted: #677f64;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    /* CENTRALIZAÇÃO PADRÃO */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #e5e7eb;
    }

    /* CONTAINER ESTILO MOBILE */
    .app-container {
      width: 375px;
      height: 812px;
      background-color: #f8fbf4; /* Tom levemente esverdeado de fundo */
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      border-radius: 30px;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      padding: 56px 24px 24px;
      position: relative;
      background: white;
    }

    .back-btn {
      width: 42px;
      height: 42px;
      border: none;
      background: #f1f6e9;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--primary);
      transition: 0.2s;
      z-index: 2;
    }

    .back-btn:active {
      transform: scale(0.9);
    }

    .title {
      position: absolute;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      color: var(--text-main);
      pointer-events: none;
    }

    /* FORMULÁRIO */
    .form {
      padding: 32px 24px;
      flex: 1;
      overflow-y: auto;
    }

    .field {
      margin-bottom: 24px;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .input {
      width: 100%;
      height: 54px;
      border: 1px solid #dfe6dc;
      border-radius: 12px;
      background: white;
      padding: 0 16px;
      font-size: 15px;
      color: var(--text-main);
      outline: none;
      transition: 0.2s;
    }

    .input:focus {
      border: 2px solid var(--primary);
    }

    /* BOTÃO SALVAR POSICIONADO NO FUNDO DO CONTAINER */
    .save-container {
      padding: 20px 24px;
      background: white;
      border-top: 1px solid #eee;
    }

    .save-btn {
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .save-btn:active {
      transform: scale(0.98);
      background: #2c622c;
    }

  </style>
</head>
<body>

  <div class="app-container">

    <div class="header">
      <button id="btnVoltar" class="back-btn">←</button>
      <div class="title">Adicionar Produto</div>
    </div>

    <div class="form">

      <div class="field">
        <label class="label">Nome do produto</label>
        <input type="text" id="nomeProduto" class="input" placeholder="Ex: Leite Integral" />
      </div>

      <div class="field">
        <label class="label">Quantidade</label>
        <input type="number" id="qtdProduto" class="input" placeholder="Ex: 2" min="1" />
      </div>

      <div class="field">
        <label class="label">Data de validade</label>
        <input type="date" id="dataValidade" class="input" />
      </div>

    </div>

    <div class="save-container">
      <button id="btnSalvar" class="save-btn">
        Salvar Produto
      </button>
    </div>

  </div>

  <script>
    // BOTÃO VOLTAR
    document.getElementById("btnVoltar").onclick = function(){
      if(window.history.length > 1){
        window.history.back();
      } else {
        alert("Voltando para a lista principal...");
      }
    };

    // BOTÃO SALVAR
    document.getElementById("btnSalvar").onclick = function(){
      const nome = document.getElementById("nomeProduto").value;
      const qtd = document.getElementById("qtdProduto").value;
      const validade = document.getElementById("dataValidade").value;

      if (!nome || !qtd || !validade) {
        alert("Por favor, preencha todos os campos!");
        return;
      }

      alert(
        "Produto salvo com sucesso!\n\n" +
        "Nome: " + nome + "\n" +
        "Quantidade: " + qtd + "\n" +
        "Validade: " + validade
      );

      console.log({ nome, qtd, validade });
    };
  </script>

</body>
</html>

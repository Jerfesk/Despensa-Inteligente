<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Cadastrar Produto</title>
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />

  <style>
    :root {
      --primary: #387d39;
      --background: #f1f6e9;
      --card-bg: #ffffff;
      --text-main: #1a461a;
      --text-muted: #677f64;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Inter", sans-serif; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #e5e7eb;
      overflow: hidden;
      padding: 20px;
    }

    .app-container {
      width: 100%;
      max-width: 375px;
      height: 100%;
      max-height: 812px;
      background-color: #f8fbf4;
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      border-radius: 30px;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      padding: 56px 24px 24px;
      position: relative;
      background: white;
    }

    .back-btn {
      width: 42px;
      height: 42px;
      border: none;
      background: #f1f6e9;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--primary);
      transition: 0.2s;
      z-index: 2;
    }

    .title {
      position: absolute;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      color: var(--text-main);
      pointer-events: none;
    }

    .form {
      padding: 24px;
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .form::-webkit-scrollbar { display: none; }

    .info-bar {
      background: #fff;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 24px;
      border: 1px solid #dfe6dc;
      text-align: center;
    }

    .info-bar p { font-size: 12px; color: var(--text-muted); font-weight: 600; }
    .info-bar span { color: var(--primary); font-family: monospace; font-size: 15px; font-weight: 700; }

    .field { margin-bottom: 20px; }
    .label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: var(--text-muted); }
    .status-busca { font-size: 11px; font-weight: 700; margin-bottom: 8px; display: block; }

    .input {
      width: 100%;
      height: 54px;
      border: 1px solid #dfe6dc;
      border-radius: 12px;
      background: white;
      padding: 0 16px;
      font-size: 15px;
      color: var(--text-main);
      outline: none;
      transition: 0.2s;
    }

    .input:focus { border: 2px solid var(--primary); }

    .save-container {
      padding: 20px 24px;
      background: white;
      border-top: 1px solid #eee;
    }

    .save-btn {
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .save-btn:disabled { background: #ccc; cursor: not-allowed; }
    .save-btn:active:not(:disabled) { transform: scale(0.98); }

  </style>
</head>
<body>

  <div class="app-container">
    <div class="header">
      <button class="back-btn" onclick="window.location.href='index.html'">←</button>
      <div class="title">Entrada no Estoque</div>
    </div>

    <div class="form">
      <div class="info-bar">
        <p>CÓDIGO: <span id="exibir-codigo">Buscando...</span></p>
      </div>

      <div class="field">
        <label class="label">Descrição do Produto</label>
        <span id="status-busca" class="status-busca" style="color: #007bff;">⏳ Iniciando busca...</span>
        <input type="text" id="nome" class="input" placeholder="Digite o nome do produto">
      </div>

      <div class="field">
        <label class="label">Quantidade</label>
        <input type="number" id="quantidade" class="input" value="1" min="1">
      </div>

      <div class="field">
        <label class="label">Data de Validade</label>
        <input type="date" id="validade" class="input">
      </div>
    </div>

    <div class="save-container">
      <button id="btnSalvar" class="save-btn" onclick="salvarProduto()">
        Salvar no Estoque
      </button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const codigo = params.get('codigo');
    const token = localStorage.getItem('token');

    // Validação inicial do Token
    if (!token) {
        alert("Sessão expirada ou inválida. Faça login novamente.");
        window.location.href = 'login.html';
    }

    document.getElementById('exibir-codigo').innerText = codigo || "Não informado";

    // Dispara a busca automática se houver código
    if (codigo) {
        buscarNomeDoProduto(codigo);
    } else {
        document.getElementById('status-busca').innerText = "⚠️ Nenhum código recebido.";
        document.getElementById('status-busca').style.color = "orange";
    }

    async function buscarNomeDoProduto(codigoBarras) {
        const statusSpan = document.getElementById('status-busca');
        const inputNome = document.getElementById('nome');

        try {
            const response = await fetch(`/api/produto/${codigoBarras}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.status === 401 || response.status === 403) {
                alert("Token inválido. Refaça o login.");
                window.location.href = 'login.html';
                return;
            }

            const data = await response.json();

            if (data.encontrado && data.nome) {
                inputNome.value = data.nome;
                statusSpan.innerText = "✅ Produto encontrado!";
                statusSpan.style.color = "green";
                document.getElementById('quantidade').focus(); // Pula para quantidade
            } else {
                statusSpan.innerText = "⚠️ Produto não catalogado. Digite o nome.";
                statusSpan.style.color = "orange";
                inputNome.focus();
            }
        } catch (error) {
            statusSpan.innerText = "❌ Erro de conexão com o servidor.";
            statusSpan.style.color = "red";
        }
    }

    // Lógica para tecla ENTER pular campos
    document.getElementById('nome').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); document.getElementById('quantidade').focus(); }
    });
    document.getElementById('quantidade').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); document.getElementById('validade').focus(); }
    });

    async function salvarProduto() {
        const btn = document.getElementById('btnSalvar');
        const dados = {
            codigo: codigo,
            nome: document.getElementById('nome').value,
            quantidade: document.getElementById('quantidade').value,
            validade: document.getElementById('validade').value
        };
    
        if(!dados.nome || !dados.quantidade) {
            alert("Obrigatório informar Nome e Quantidade!");
            return;
        }

        btn.innerText = "Salvando...";
        btn.disabled = true;

        try {
            const response = await fetch('/api/estoque', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(dados)
            });

            if (response.ok) {
                alert("Produto adicionado ao estoque!");
                window.location.href = 'estoque.html';
            } else {
                const errData = await response.json();
                alert("Erro ao salvar: " + (errData.erro || "Verifique os dados"));
            }
        } catch (error) {
            alert("Erro crítico de rede ao salvar.");
        } finally {
            btn.innerText = "Salvar no Estoque";
            btn.disabled = false;
        }
    }
  </script>
</body>
</html>

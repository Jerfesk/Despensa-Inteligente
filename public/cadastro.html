<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Produto</title>
    <style>
        body { font-family: sans-serif; padding: 20px; display: flex; justify-content: center; background: #f8f9fa; }
        .form-card { border: 1px solid #ccc; padding: 20px; border-radius: 10px; width: 350px; background: white; box-shadow: 2px 2px 5px #ccc; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; color: #333; }
        input { width: 100%; margin-top: 5px; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .status-busca { font-size: 12px; color: #007bff; font-style: italic; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>📦 Entrada no Estoque</h2>
        <p style="font-size: 14px; color: #666; margin-bottom: 0;"><strong>Código:</strong> <span id="exibir-codigo"></span></p>
        
        <label>Descrição do Produto:</label>
        <span id="status-busca" class="status-busca">Buscando na internet... ⏳</span>
        <input type="text" id="nome" placeholder="Ex: Feijão Carioca 1kg">
        
        <label>Quantidade:</label>
        <input type="number" id="quantidade" placeholder="Ex: 2" value="1" min="1">
        
        <label>Data de Validade:</label>
        <input type="date" id="validade">
        
        <button onclick="salvarProduto()">Salvar no Estoque</button>
    </div>

    <script>
        // Pega o código de barras que o scanner mandou pela URL
        const params = new URLSearchParams(window.location.search);
        const codigo = params.get('codigo');
        
        document.getElementById('exibir-codigo').innerText = codigo || "Nenhum código lido";

        // Se tiver código, chama o back-end para preencher a descrição
        if (codigo) {
            buscarNomeDoProduto(codigo);
        } else {
            document.getElementById('status-busca').innerText = "Nenhum código para buscar.";
        }

        async function buscarNomeDoProduto(codigoBarras) {
            try {
                // Chama aquela rota do Node.js que criamos agora
                const response = await fetch(`/api/produto/${codigoBarras}`);
                const data = await response.json();
                
                const statusSpan = document.getElementById('status-busca');
                const inputNome = document.getElementById('nome');

                if (data.encontrado && data.nome) {
                    inputNome.value = data.nome;
                    statusSpan.innerText = "✅ Produto encontrado!";
                    statusSpan.style.color = "green";
                } else {
                    statusSpan.innerText = "⚠️ Produto não encontrado. Digite a descrição.";
                    statusSpan.style.color = "orange";
                }
            } catch (error) {
                console.error("Erro na busca:", error);
                document.getElementById('status-busca').innerText = "Erro ao buscar produto.";
            }
        }

        function salvarProduto() {
            const dados = {
                codigo: codigo,
                nome: document.getElementById('nome').value,
                quantidade: document.getElementById('quantidade').value,
                validade: document.getElementById('validade').value
            };
            
            if(!dados.nome) {
                alert("Por favor, preencha a descrição do produto!");
                return;
            }
            
            console.log("Pronto para salvar no banco de dados:", dados);
            alert(`Produto "${dados.nome}" salvo com sucesso!`);
            
            // Redireciona de volta para a tela inicial
            window.location.href = 'index.html'; 
        }
    </script>
</body>
</html>

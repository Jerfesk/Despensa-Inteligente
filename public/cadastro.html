<!DOCTYPE html>
<html>
<head>
    <title>Cadastrar Produto</title>
    <style>
        body { font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .form-card { border: 1px solid #ccc; padding: 20px; border-radius: 10px; width: 300px; }
        input { width: 100%; margin-bottom: 15px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Novo Produto</h2>
        <p><strong>Código:</strong> <span id="exibir-codigo"></span></p>
        
        <label>Quantidade:</label>
        <input type="number" id="quantidade" placeholder="Ex: 2">
        
        <label>Data de Validade:</label>
        <input type="date" id="validade">
        
        <button onclick="salvarProduto()">Salvar na Despensa</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const codigo = params.get('codigo');
        document.getElementById('exibir-codigo').innerText = codigo;

        function salvarProduto() {
            const dados = {
                codigo: codigo,
                quantidade: document.getElementById('quantidade').value,
                validade: document.getElementById('validade').value
            };
            
            console.log("Salvando no sistema:", dados);
            alert("Produto salvo com sucesso! (Lógica de banco de dados entra aqui)");
            window.location.href = 'index.html'; 
        }
    </script>
</body>
</html>
